<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepZero Meet - Phần Mềm Họp Trực Tuyến Không Giới Hạn</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #1c1c1e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #lobby-view {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 100;
            background: #1c1c1e;
        }
        .setup-box {
            background: #2c2c2e;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            text-align: center;
            max-width: 400px;
            width: 85%;
        }
        h2 {
            color: #0a84ff;
            margin: 0 0 8px 0;
            font-size: 26px;
            font-weight: 600;
        }
        p {
            color: #8e8e93;
            font-size: 14px;
            margin: 0 0 25px 0;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #3a3a3c;
            background: #1c1c1e;
            color: #ffffff;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus {
            border-color: #0a84ff;
            outline: none;
        }
        button.start-btn {
            width: 100%;
            padding: 14px;
            background: #0a84ff;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        button.start-btn:hover {
            background: #007aff;
        }
    </style>
</head>
<body>

    <!-- GIAO DIỆN PHÒNG CHỜ -->
    <div id="lobby-view">
        <div class="setup-box">
            <h2>DeepZero Meet</h2>
            <p>Hệ thống họp trực tuyến mở rộng vĩnh viễn miễn phí</p>
            <input type="text" id="room-id" placeholder="Nhập tên phòng (Ví dụ: dayhoconline)">
            <input type="text" id="user-name" placeholder="Nhập tên hiển thị của bạn">
            <button class="start-btn" onclick="startMeeting()">Bắt Đầu Cuộc Họp</button>
        </div>
    </div>

    <script>
        // Tự động điền tên phòng từ URL nếu có (?room=abc)
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const urlRoomId = urlParams.get('room');
            if (urlRoomId) {
                document.getElementById('room-id').value = urlRoomId;
            }
        });

        function startMeeting() {
            const roomId = document.getElementById('room-id').value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '');
            const userName = document.getElementById('user-name').value.trim();

            if (!roomId || !userName) {
                alert("Vui lòng nhập đầy đủ Tên phòng và Tên của bạn!");
                return;
            }

            const roomName = "dzmeet-" + roomId;
            
            // Sửa lỗi nối chuỗi: Đảm bảo có dấu gạch chéo hợp lệ trước tên phòng
            window.location.href = "https://jit.si" + roomName + '#userInfo.displayName="' + encodeURIComponent(userName) + '"';
        }
    </script>
</body>
</html>
