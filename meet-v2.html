<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepZero Meet - Họp Trực Tuyến Tiếng Việt</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 0; 
            background: #1a1a1a; color: white; 
            display: flex; flex-direction: column; height: 100vh; 
            justify-content: center; align-items: center; 
        }
        #setup-container { 
            background: #2d2d2d; padding: 35px; border-radius: 14px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.5); text-align: center; 
            max-width: 420px; width: 90%; 
        }
        h2 { color: #0e71eb; margin: 0 0 10px 0; font-size: 26px; }
        p { color: #aaa; font-size: 14px; margin: 0 0 25px 0; }
        input { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1px solid #444; background: #3d3d3d; color: white; 
            border-radius: 8px; box-sizing: border-box; font-size: 15px; 
        }
        input:focus { border-color: #0e71eb; outline: none; }
        button { 
            width: 100%; padding: 13px; background: #0e71eb; color: white; 
            border: none; border-radius: 8px; font-size: 16px; 
            font-weight: bold; cursor: pointer; margin-top: 15px; 
        }
        button:hover { background: #0c5dc2; }
    </style>
</head>
<body>

    <!-- GIAO DIỆN TẠO PHÒNG TIẾNG VIỆT -->
    <div id="setup-container">
        <h2>DeepZero Meet</h2>
        <p>Hệ thống kết nối phòng họp trực tuyến vĩnh viễn</p>
        <input type="text" id="room-id" placeholder="Nhập mã ID phòng (Ví dụ: lop12a, hopteam)">
        <button onclick="goToMeeting()">Bắt Đầu Cuộc Họp</button>
    </div>

    <script>
        // Tự động đọc mã phòng từ link mời nếu có đuôi ?room=...
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const urlRoomId = urlParams.get('room');
            if (urlRoomId) {
                document.getElementById('room-id').value = urlRoomId;
            }
        });

        function goToMeeting() {
            let roomId = document.getElementById('room-id').value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '');
            
            if (!roomId) {
                alert("Vui lòng nhập mã ID phòng họp!");
                return;
            }

            // Định dạng mã phòng thành chuẩn 3-4-3 ký tự của Google Meet để không bị lỗi bảo mật
            if (roomId.length < 10) {
                roomId = (roomId + "abcdefghij").substring(0, 10);
            }
            const formattedRoom = roomId.substring(0,3) + "-" + roomId.substring(3,7) + "-" + roomId.substring(7,10);

            // Chuyển hướng thẳng sang máy chủ Google Meet chính thức để lấy toàn bộ quyền quản lý phòng
            window.location.href = "https://google.com" + formattedRoom;
        }
    </script>
</body>
</html>
